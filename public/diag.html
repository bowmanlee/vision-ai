<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vision AI — MediaPipe Diagnostic</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .status { padding: 12px 16px; border-radius: 8px; margin: 12px 0; }
    .pending { background: #f0f9ff; color: #0369a1; }
    .success { background: #f0fdf4; color: #15803d; }
    .error { background: #fef2f2; color: #b91c1c; }
    pre { background: #f8fafc; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 6px; border: 1px solid #cbd5e1; background: #fff; }
    button:hover { background: #f1f5f9; }
    #video-container { width: 100%; max-width: 640px; aspect-ratio: 4/3; background: #000; border-radius: 8px; overflow: hidden; margin: 16px 0; }
    video { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>
  <h1>Vision AI — MediaPipe Diagnostic</h1>
  <p>This page tests camera + MediaPipe without React. Open the browser console (F12) for detailed logs.</p>

  <button id="startBtn">Start Camera & Test MediaPipe</button>
  <button id="stopBtn" style="display:none;">Stop</button>

  <div id="video-container" style="display:none;">
    <video id="video" playsinline muted autoplay></video>
  </div>

  <div id="log"></div>

  <script type="module">
    const logEl = document.getElementById('log');
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('video-container');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');

    function log(msg, type = 'pending') {
      const div = document.createElement('div');
      div.className = `status ${type}`;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(div);
      console.log('[Diag]', msg);
    }

    let stream = null;

    startBtn.addEventListener('click', async () => {
      logEl.innerHTML = '';
      startBtn.disabled = true;

      try {
        // Step 1: Camera
        log('Requesting camera permission...');
        stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false });
        video.srcObject = stream;
        videoContainer.style.display = 'block';
        await new Promise((resolve, reject) => {
          video.onloadedmetadata = () => resolve();
          video.onerror = () => reject(new Error('Video error'));
        });
        await video.play();
        log('Camera started successfully', 'success');

        // Step 2: Load MediaPipe
        log('Importing @mediapipe/tasks-vision...');
        const { FilesetResolver, FaceLandmarker } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/+esm');
        log('Module imported successfully', 'success');

        log('Loading WASM runtime...');
        const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm');
        log('WASM runtime loaded', 'success');

        log('Creating FaceLandmarker (GPU)...');
        const faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
            delegate: 'GPU',
          },
          runningMode: 'VIDEO',
          numFaces: 1,
        });
        log('FaceLandmarker created', 'success');

        log('Running detection...');
        const result = faceLandmarker.detectForVideo(video, performance.now());
        log(`Detection complete. Faces found: ${result.faceLandmarks?.length ?? 0}`, 'success');

        faceLandmarker.close();
        log('All tests passed! MediaPipe is working.', 'success');
      } catch (err) {
        log(`ERROR: ${err.message || err}`, 'error');
        console.error(err);
      } finally {
        startBtn.disabled = false;
        stopBtn.style.display = 'inline-block';
      }
    });

    stopBtn.addEventListener('click', () => {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      video.srcObject = null;
      videoContainer.style.display = 'none';
      stopBtn.style.display = 'none';
      log('Stopped');
    });
  </script>
</body>
</html>
